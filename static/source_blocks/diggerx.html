<div class="input-block">
	<label>Name:</label>
	<input type="text" name="source_name[]" placeholder="locations.csv"><br>

	<label>Connection:</label>
	<input type="text" name="source_connection[]" data-connection readonly><br>

	<label>Type:</label>
	<input type="text" name="source_type[]" value="http-csv" readonly><br>

	<label>Path:</label>
	<input type="text" name="source_path[]" placeholder="/data/locations.csv"><br>

	<button type="button" class="remove-btn">Remove</button>
</div>
