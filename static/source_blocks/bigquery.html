<div class="input-block">
    <label>Name:</label>
    <input type="text" name="source_name[]" placeholder="Source Name"><br>

    <label>Connection:</label>
    <input type="text" name="source_connection[]" data-connection readonly><br>

    <label>Type:</label>
    <input type="text" name="source_type[]" value="bigquery" readonly><br>

    <label>Query:</label>
    <textarea name="source_path[]" rows="10" placeholder="ENTER QUERY"></textarea><br>

    <button type="button" class="remove-btn">Remove</button>
</div>
