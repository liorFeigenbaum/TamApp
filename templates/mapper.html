<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input File Mapper — TAM App</title>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="topbar">
  <a class="topbar-brand" href="/">
    <span class="topbar-brand-dot"></span>
    TAM App
  </a>
  <div class="topbar-nav">
    <a href="/">Home</a>
    <a href="/config">Generator</a>
    <a href="/configV">Validator</a>
  </div>
</nav>

<div class="page-wrapper">

  <div class="page-header">
    <h1>Input File Mapper</h1>
    <p>Define data blocks to build your input_file_mapper.yml.</p>
  </div>

  <div class="add-block-row">
    <select id="blockType">
      <option value="text">Text</option>
      <option value="email">Email</option>
    </select>
    <button type="button" class="btn" onclick="addBlock()">+ Add Block</button>
  </div>

  <form method="POST">
    <div id="blockContainer" class="two-columns"></div>
    <div class="nav-buttons" style="border-top:1px solid var(--color-border);margin-top:24px;padding-top:20px;">
      <a href="/" class="btn btn-ghost">← Back to Home</a>
      <button type="submit" class="btn btn-primary">Generate Mapper</button>
    </div>
  </form>

  {% if submitted_data %}
  <div style="margin-top:32px;">
    <div class="section-label"><h2>Submitted Data</h2></div>
    <ul style="color:var(--color-gray-light);padding-left:20px;">
      {% for item in submitted_data %}
      <li>{{ item }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

</div>

<script>
function addBlock() {
  const type = document.getElementById("blockType").value;
  const container = document.getElementById("blockContainer");

  const block = document.createElement("div");
  block.className = "input-block";

  const label = type.charAt(0).toUpperCase() + type.slice(1);
  block.innerHTML = `
    <label>${label}</label>
    <input type="${type === 'email' ? 'email' : 'text'}" name="data[]" placeholder="Enter ${type}">
  `;

  container.appendChild(block);
}
</script>

</body>
</html>
