<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 20px;
        }
        .input-block {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .input-block input {
            margin: 5px 0;
            padding: 6px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Add Data Blocks</h2>

<!-- Dropdown + Add Button -->
<select id="blockType">
    <option value="text">Text</option>
    <option value="email">Email</option>
</select>
<button type="button" onclick="addBlock()">Add</button>

<!-- Form to submit the data -->
<form method="POST">
    <div id="blockContainer"></div>
    <button type="submit">Submit All</button>
</form>

{% if submitted_data %}
    <h3>Submitted Data:</h3>
    <ul>
        {% for item in submitted_data %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
{% endif %}

		<script>
		function addBlock() {
		    const type = document.getElementById("blockType").value;
		    const container = document.getElementById("blockContainer");

		    const block = document.createElement("div");
		    block.className = "input-block";

		    let inputType = "text";
		    if (type === "email") inputType = "email";

		    block.innerHTML = `
		        <label>${type.charAt(0).toUpperCase() + type.slice(1)}:</label>
		        <input type="${inputType}" name="data[]" placeholder="Enter ${type}">
		    `;

		    container.appendChild(block);
		}
		</script>

</body>
</html>
