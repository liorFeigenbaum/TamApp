<!DOCTYPE html>
<html lang="en">
		<head>
				<title>config.yaml preview</title>
				<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
		</head>
		<body>
				
				<h1>config.yaml preview</h1>
				
				<pre class="input-block">{{ yaml_text }}</pre>
				
				<form method="post" action="{{ url_for('download') }}">
						<button type="submit">⬇ Download</button>
				</form>
				
				<form method="get" action="{{ url_for('config') }}">
						<button type="submit">⬅ Back to edit</button>
				</form>
		
		</body>
</html>
